[package]
name = "openanime"
version = "1.0.0"
description = "OpenAnime"
authors = [".dark_hunter"]
edition = "2021"

[lib]
name = "openanime_desktop_windows_lib"
crate-type = ["staticlib", "cdylib", "rlib"]

[build-dependencies]
tauri-build = { version = "2", features = [] }

[dependencies]
tauri = { version = "2", features = ["native-tls-vendored"] }
tauri-plugin-opener = "2"
tauri-plugin-window-state = "2.4.1"

[target.'cfg(target_os = "windows")'.dependencies]
wry = "0.55"
webview2-com = "0.38"
windows-core = "0.61"

[profile.release]
opt-level = 3
lto = true
codegen-units = 1
strip = true
panic = "abort"
