name: '🚀 Publish'

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Sürüm numarası (örn: 1.0.2-beta, 1.0.3-alpha, 1.0.1)'
        required: true
        type: string
      channel:
        description: 'Release kanalı (prerelease durumunu belirler)'
        required: true
        default: 'beta'
        type: choice
        options:
          - stable
          - beta
          - alpha
      draft:
        description: 'Draft olarak oluştur (açıklamayı sonra sen yazarsın)'
        required: true
        default: true
        type: boolean

concurrency:
  group: publish-${{ inputs.version }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  SCCACHE_GHA_ENABLED: "true"
  RUSTC_WRAPPER: "sccache"

jobs:
  publish:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            args: ''
            target: aarch64-apple-darwin
            label: macOS-ARM64
          - platform: windows-latest
            args: ''
            target: x86_64-pc-windows-msvc
            label: Windows-x64

    runs-on: ${{ matrix.platform }}

    steps:
      - uses: actions/checkout@v7

      # ────────────────────────────────────────────────────
      # Toolchain + sccache
      # ────────────────────────────────────────────────────
      - name: Setup sccache
        uses: mozilla-actions/sccache-action@v0.0.7

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: lts/*

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      # ────────────────────────────────────────────────────
      # 3. Cache
      # ────────────────────────────────────────────────────
      - name: Cache Tauri bundler (NSIS, Wix etc.)
        if: matrix.platform == 'windows-latest'
        uses: actions/cache@v6
        with:
          path: ~\AppData\Local\tauri
          key: ${{ runner.os }}-tauri-bundler-${{ hashFiles('src-tauri/tauri.conf.json') }}
          restore-keys: |
            ${{ runner.os }}-tauri-bundler-

      - name: Cache Rust dependencies
        uses: actions/cache@v6
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
          key: ${{ matrix.target }}-cargo-${{ hashFiles('src-tauri/Cargo.lock') }}
          restore-keys: |
            ${{ matrix.target }}-cargo-

      - name: Cache Bun
        uses: actions/cache@v6
        with:
          path: ~/.bun
          key: ${{ runner.os }}-bun-${{ hashFiles('bun.lock', 'package.json') }}
          restore-keys: |
            ${{ runner.os }}-bun-

      # ────────────────────────────────────────────────────
      # 4. Build & Release
      # ────────────────────────────────────────────────────
      - name: Install frontend dependencies
        run: bun install

      - name: Build & publish
        uses: tauri-apps/tauri-action@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          tagName: v${{ inputs.version }}
          releaseName: 'OpenAnime Desktop v${{ inputs.version }} (${{ inputs.channel }})'
          releaseDraft: ${{ inputs.draft == 'true' }}
          prerelease: ${{ inputs.channel != 'stable' }}
          args: ${{ matrix.args }} --verbose

  # ────────────────────────────────────────────────────
  # 5. Kanal manifestini güncelle (beta/alpha)
  #    updater.rs beta/alpha kanalları için
  #    updater/latest-<channel>.json dosyalarını okur.
  #    Yayınlanan latest.json'u bu dosyaya kopyalayıp main'e commit'ler.
  #    Sadece draft OLMAYAN beta/alpha yayınlarında çalışır.
  # ────────────────────────────────────────────────────
  update-channel-manifest:
    needs: publish
    if: ${{ inputs.channel != 'stable' && inputs.draft == 'false' }}
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v7
        with:
          ref: main

      - name: Yayınlanan latest.json'u indir
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          mkdir -p updater
          gh release download "v${{ inputs.version }}" \
            --repo "${{ github.repository }}" \
            --pattern "latest.json" \
            --output "updater/latest-${{ inputs.channel }}.json" \
            --clobber

      - name: Değişikliği main'e commit'le
        run: |
          if git diff --quiet -- "updater/latest-${{ inputs.channel }}.json"; then
            echo "Manifest değişmedi, commit yok."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add "updater/latest-${{ inputs.channel }}.json"
          git commit -m "chore(updater): ${{ inputs.channel }} kanal manifestini v${{ inputs.version }} olarak güncelle"
          git push origin main
