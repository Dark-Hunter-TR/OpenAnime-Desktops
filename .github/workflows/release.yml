name: '🚀 Publish'

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Sürüm numarası (örn: 1.0.2-beta, 1.0.3-alpha, 1.0.1)'
        required: true
        type: string
      channel:
        description: 'Release kanalı (prerelease durumunu belirler)'
        required: true
        default: 'beta'
        type: choice
        options:
          - stable
          - beta
          - alpha
      draft:
        description: 'Draft olarak oluştur (açıklamayı sonra sen yazarsın)'
        required: true
        default: true
        type: boolean

concurrency:
  group: publish-${{ inputs.version }}
  cancel-in-progress: true

jobs:
  publish:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            args: ''
            target: aarch64-apple-darwin
            label: macOS-ARM64
          - platform: windows-latest
            args: ''
            target: x86_64-pc-windows-msvc
            label: Windows-x64
          - platform: ubuntu-22.04
            args: ''
            target: x86_64-unknown-linux-gnu
            label: Linux-x64
          - platform: ubuntu-22.04
            args: '--target aarch64-unknown-linux-gnu'
            target: aarch64-unknown-linux-gnu
            label: Linux-ARM64

    runs-on: ${{ matrix.platform }}

    steps:
      - uses: actions/checkout@v4

      # ────────────────────────────────────────────────────
      # 1. Linux bağımlılıkları
      # ────────────────────────────────────────────────────
      - name: Install Linux dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get remove -y 'libunwind-1[0-9]-dev' || true
          sudo apt-get install -y libunwind-dev
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            build-essential \
            curl \
            wget \
            file \
            libxdo-dev \
            libssl-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            libgstreamer1.0-dev \
            libgstreamer-plugins-base1.0-dev \
            gstreamer1.0-plugins-good \
            gstreamer1.0-plugins-bad \
            gstreamer1.0-plugins-ugly \
            gstreamer1.0-libav

      - name: Install ARM64 cross-compilation deps
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        run: |
          sudo apt-get install -y \
            gcc-aarch64-linux-gnu \
            g++-aarch64-linux-gnu \
            libwebkit2gtk-4.1-dev:arm64 \
            libgtk-3-dev:arm64 \
            libayatana-appindicator3-dev:arm64 \
            librsvg2-dev:arm64 || true
          rustup target add aarch64-unknown-linux-gnu
          echo "CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER=aarch64-linux-gnu-gcc" >> $GITHUB_ENV

      # ────────────────────────────────────────────────────
      # 2. Toolchain
      # ────────────────────────────────────────────────────
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: lts/*

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      # ────────────────────────────────────────────────────
      # 3. Cache
      # ────────────────────────────────────────────────────
      - name: Cache Rust
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            src-tauri/target
          key: ${{ matrix.target }}-cargo-${{ hashFiles('src-tauri/Cargo.lock') }}
          restore-keys: |
            ${{ matrix.target }}-cargo-

      - name: Cache Bun
        uses: actions/cache@v4
        with:
          path: ~/.bun
          key: ${{ runner.os }}-bun-${{ hashFiles('bun.lock', 'package.json') }}
          restore-keys: |
            ${{ runner.os }}-bun-

      # ────────────────────────────────────────────────────
      # 4. Build & Release
      # ────────────────────────────────────────────────────
      - name: Install frontend dependencies
        run: bun install

      - name: Build & publish
        uses: tauri-apps/tauri-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          tagName: v${{ inputs.version }}
          releaseName: 'OpenAnime Desktop v${{ inputs.version }} (${{ inputs.channel }})'
          releaseDraft: ${{ inputs.draft == 'true' }}
          prerelease: ${{ inputs.channel != 'stable' }}
          args: ${{ matrix.args }}
