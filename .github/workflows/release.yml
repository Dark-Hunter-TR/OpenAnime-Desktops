name: '🚀 Publish'

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Sürüm Numarası (Boş bırakılırsa en büyük sürüm baz alınarak otomatik hesaplanır)'
        required: false
        type: string
      channel:
        description: 'Yayın Kanalı (Sürümün türünü belirler)'
        required: true
        default: 'beta'
        type: choice
        options:
          - stable
          - beta
          - alpha
      bump_type:
        description: 'Sürüm Atlama Türü (Otomatik hesaplama yapılırken hangi hane artırılsın)'
        required: true
        default: 'patch'
        type: choice
        options:
          - patch  # Sürümün son hanesini artırır (1.0.2 -> 1.0.3)
          - minor  # Sürümün orta hanesini artırır (1.0.2 -> 1.1.0)
          - major  # Sürümün ilk hanesini artırır (1.0.2 -> 2.0.0)
      draft:
        description: 'Taslak olarak mı oluşturulsun? (Hayır seçilirse derleme bittiğinde otomatik yayınlanır)'
        required: true
        default: false
        type: boolean
      build_mode:
        description: 'Derleme Modu (Hata ayıklama / Debug sürümünün de derlenip eklenmesi)'
        required: true
        default: 'both'
        type: choice
        options:
          - stable-only  # Sadece kararlı kullanıcı sürümü derlenir
          - debug-only   # Sadece DevTools açık hata ayıklama sürümü derlenir
          - both         # Her iki sürüm de derlenip release alanına yüklenir

concurrency:
  group: publish-${{ github.ref }}-${{ inputs.channel }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  SCCACHE_GHA_ENABLED: "true"
  RUSTC_WRAPPER: "sccache"

jobs:
  publish:
    permissions:
      contents: write
    outputs:
      app_version: ${{ steps.versioning.outputs.version }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            args: ''
            target: aarch64-apple-darwin
            label: macOS-ARM64
          - platform: windows-latest
            args: ''
            target: x86_64-pc-windows-msvc
            label: Windows-x64

    runs-on: ${{ matrix.platform }}

    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0 # Tüm geçmişi ve tag'leri çekmek için

      # ────────────────────────────────────────────────────
      # Toolchain + sccache
      # ────────────────────────────────────────────────────
      - name: Setup sccache
        uses: mozilla-actions/sccache-action@v0.0.7

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: lts/*

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      # ────────────────────────────────────────────────────
      # 3. Cache
      # ────────────────────────────────────────────────────
      - name: Cache Tauri bundler (NSIS, Wix etc.)
        if: matrix.platform == 'windows-latest'
        uses: actions/cache@v6
        with:
          path: ~\AppData\Local\tauri
          key: ${{ runner.os }}-tauri-bundler-${{ hashFiles('src-tauri/tauri.conf.json') }}
          restore-keys: |
            ${{ runner.os }}-tauri-bundler-

      - name: Cache Rust dependencies
        uses: actions/cache@v6
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
          key: ${{ matrix.target }}-cargo-${{ hashFiles('src-tauri/Cargo.lock') }}
          restore-keys: |
            ${{ matrix.target }}-cargo-

      - name: Cache Bun
        uses: actions/cache@v6
        with:
          path: ~/.bun
          key: ${{ runner.os }}-bun-${{ hashFiles('bun.lock', 'package.json') }}
          restore-keys: |
            ${{ runner.os }}-bun-

      # ────────────────────────────────────────────────────
      # 4. Build & Release
      # ────────────────────────────────────────────────────
      - name: Calculate & Update Version
        id: versioning
        shell: bash
        env:
          INPUT_VERSION: ${{ inputs.version }}
          INPUT_CHANNEL: ${{ inputs.channel }}
          INPUT_BUMP_TYPE: ${{ inputs.bump_type }}
        run: |
          node -e '
            const fs = require("fs");
            const { execSync } = require("child_process");
            
            let finalVersion = process.env.INPUT_VERSION ? process.env.INPUT_VERSION.trim() : "";
            const channel = process.env.INPUT_CHANNEL || "beta";
            const bumpType = process.env.INPUT_BUMP_TYPE || "patch";
            
            if (!finalVersion) {
              console.log("Sürüm girilmedi, yerel git tag geçmişi taranıyor...");
              let allTags = [];
              try {
                // Tüm etiketleri çek
                allTags = execSync("git tag -l").toString().trim().split("\n").map(t => t.trim()).filter(Boolean);
              } catch (e) {
                console.log("Etiketler okunamadı, v0.0.0 baz alınacak.");
              }
              
              // Etiketleri sayısal SemVer kurallarına göre sıralamak için fonksiyon
              const parseSemVer = (tag) => {
                const clean = tag.startsWith("v") ? tag.slice(1) : tag;
                // v1.0.2-beta-02 formatını v1.0.2-beta.2 formatına dönüştürerek SemVer parse başarısını artır
                const normalized = clean.replace(/-([a-zA-Z]+)-(\d+)/, "-$1.$2");
                const match = normalized.match(/^(\d+)\.(\d+)\.(\d+)(?:-([a-zA-Z0-9.]+))?$/);
                if (!match) return null;
                
                const major = parseInt(match[1]);
                const minor = parseInt(match[2]);
                const patch = parseInt(match[3]);
                const prerelease = match[4] || "";
                
                return { major, minor, patch, prerelease, raw: tag, normalized };
              };
              
              const parsedTags = allTags.map(parseSemVer).filter(Boolean);
              
              // En yüksek/büyük sürümü bul (SemVer Karşılaştırma)
              let highest = null;
              for (const curr of parsedTags) {
                if (!highest) {
                  highest = curr;
                  continue;
                }
                
                // Major karşılaştır
                if (curr.major !== highest.major) {
                  if (curr.major > highest.major) highest = curr;
                  continue;
                }
                // Minor karşılaştır
                if (curr.minor !== highest.minor) {
                  if (curr.minor > highest.minor) highest = curr;
                  continue;
                }
                // Patch karşılaştır
                if (curr.patch !== highest.patch) {
                  if (curr.patch > highest.patch) highest = curr;
                  continue;
                }
                
                // Prerelease karşılaştır (Boş olan yani kararlı sürüm prerelease olandan büyüktür)
                if (curr.prerelease !== highest.prerelease) {
                  if (!curr.prerelease) {
                    // curr stable, highest prerelease -> curr daha büyük
                    highest = curr;
                  } else if (highest.prerelease) {
                    // Her ikisi de prerelease -> metinsel veya sayısal karşılaştır
                    if (curr.prerelease > highest.prerelease) highest = curr;
                  }
                }
              }
              
              const latestTag = highest ? highest.raw : "v0.0.0";
              const cleanTag = highest ? highest.normalized.split("-")[0] : "0.0.0";
              const prerelease = highest ? (highest.normalized.split("-")[1] || "") : "";
              
              console.log("Bulunan sayısal olarak en büyük Git etiketi:", latestTag);
              
              const parts = cleanTag.split(".");
              let major = parseInt(parts[0]);
              let minor = parseInt(parts[1]);
              let patch = parseInt(parts[2]);
              
              // Sürüm atlama mantığı (Bump Type)
              if (bumpType === "major") {
                major += 1;
                minor = 0;
                patch = 0;
              } else if (bumpType === "minor") {
                minor += 1;
                patch = 0;
              } else {
                // varsayılan: patch
                patch += 1;
              }
              
              if (channel === "stable") {
                // Stable kanalinda prerelease etiketini kaldir
                finalVersion = `${major}.${minor}.${patch}`;
              } else {
                // beta veya alpha kanali
                if (prerelease && prerelease.startsWith(channel) && bumpType === "patch") {
                  // Eğer patch artırılıyorsa ve en son tag de zaten bu kanaldaysa, indeksi artır
                  const partsPre = prerelease.split(".");
                  const index = partsPre.length > 1 ? parseInt(partsPre[1]) : 0;
                  // Orijinal patch versiyonunu geri çekiyoruz çünkü sadece prerelease indeksi artmalı (örn: 1.0.2-beta.1 -> 1.0.2-beta.2)
                  let origPatch = parseInt(highest.normalized.split("-")[0].split(".")[2]);
                  finalVersion = `${major}.${minor}.${origPatch}-${channel}.${index + 1}`;
                } else {
                  // Yeni bir pre-release serisi baslat (kanal.1 olur)
                  finalVersion = `${major}.${minor}.${patch}-${channel}.1`;
                }
              }
            }
            
            // SemVer Doğrulama
            const semverRegex = /^\d+\.\d+\.\d+(-[a-zA-Z0-9.]+)?$/;
            if (!semverRegex.test(finalVersion)) {
              console.error("HATA: Hesaplanan sürüm numarası SemVer standartlarına uymuyor:", finalVersion);
              process.exit(1);
            }
            
            console.log("UYGULANACAK SÜRÜM:", finalVersion);
            
            // Sonraki adımlar için hem GITHUB_ENV hem de GITHUB_OUTPUTya kaydet
            fs.appendFileSync(process.env.GITHUB_ENV, "APP_VERSION=" + finalVersion + "\n");
            fs.appendFileSync(process.env.GITHUB_OUTPUT, "version=" + finalVersion + "\n");
            
            // 1. package.json geçici güncelle
            const pkg = JSON.parse(fs.readFileSync("package.json", "utf8"));
            pkg.version = finalVersion;
            fs.writeFileSync("package.json", JSON.stringify(pkg, null, 2));
            console.log("package.json geçici olarak güncellendi.");
            
            // 2. tauri.conf.json geçici güncelle
            const tauri = JSON.parse(fs.readFileSync("src-tauri/tauri.conf.json", "utf8"));
            tauri.version = finalVersion;
            fs.writeFileSync("src-tauri/tauri.conf.json", JSON.stringify(tauri, null, 2));
            console.log("tauri.conf.json geçici olarak güncellendi.");
            
            // 3. Cargo.toml geçici güncelle
            let cargo = fs.readFileSync("src-tauri/Cargo.toml", "utf8");
            cargo = cargo.replace(/^version = ".*"/m, "version = \"" + finalVersion + "\"");
            fs.writeFileSync("src-tauri/Cargo.toml", cargo);
            console.log("Cargo.toml geçici olarak güncellendi.");
          '

      - name: Print Version Summary
        shell: bash
        run: |
          echo "### 🚀 Sürüm Otomasyonu Bilgisi" >> $GITHUB_STEP_SUMMARY
          echo "- **Kanal:** ${{ inputs.channel }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Belirlenen Sürüm:** \`v$APP_VERSION\`" >> $GITHUB_STEP_SUMMARY
          echo "- **Derleme Tipi:** ${{ inputs.build_mode }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Draft Durumu:** ${{ inputs.draft }}" >> $GITHUB_STEP_SUMMARY

      - name: Install frontend dependencies
        run: bun install

      - name: Build & Publish Stable Version
        if: ${{ inputs.build_mode == 'stable-only' || inputs.build_mode == 'both' }}
        uses: tauri-apps/tauri-action@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          tagName: v${{ env.APP_VERSION }}
          releaseName: 'OpenAnime Desktop v${{ env.APP_VERSION }} (${{ inputs.channel }})'
          releaseDraft: true # Her zaman taslak olarak basla, zamanlama hatasini engelle
          prerelease: ${{ inputs.channel != 'stable' }}
          args: ${{ matrix.args }} --verbose

      - name: Build & Publish Debug Version
        if: ${{ inputs.build_mode == 'debug-only' || inputs.build_mode == 'both' }}
        uses: tauri-apps/tauri-action@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: v${{ env.APP_VERSION }}
          releaseName: 'OpenAnime Desktop v${{ env.APP_VERSION }} (${{ inputs.channel }})'
          releaseDraft: true # Her zaman taslak olarak basla, zamanlama hatasini engelle
          prerelease: ${{ inputs.channel != 'stable' }}
          args: --debug ${{ matrix.args }} --verbose

      - name: Save updater manifest artifact
        if: ${{ inputs.build_mode == 'stable-only' || inputs.build_mode == 'both' }}
        run: |
          if [ -f src-tauri/target/release/bundle/updater/latest.json ]; then
            cp src-tauri/target/release/bundle/updater/latest.json latest-${{ matrix.platform }}.json
          elif [ -f target/release/bundle/updater/latest.json ]; then
            cp target/release/bundle/updater/latest.json latest-${{ matrix.platform }}.json
          else
            echo "Updater manifest not found (signing key might be missing)."
          fi
        shell: bash

      - name: Upload updater manifest artifact
        if: ${{ inputs.build_mode == 'stable-only' || inputs.build_mode == 'both' }}
        uses: actions/upload-artifact@v4
        with:
          name: latest-${{ matrix.platform }}
          path: latest-${{ matrix.platform }}.json
          if-no-files-found: ignore

  # ────────────────────────────────────────────────────
  # 5. Farklı platformların latest.json dosyalarını birleştir
  # ────────────────────────────────────────────────────
  merge-updater-manifest:
    needs: publish
    if: ${{ inputs.build_mode != 'debug-only' }}
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: latest-*
          merge-multiple: true

      - name: Merge updater manifests
        run: |
          node -e '
            const fs = require("fs");
            let merged = {
              version: "",
              notes: "",
              pub_date: "",
              platforms: {}
            };
            const files = fs.readdirSync(".").filter(f => f.startsWith("latest-") && f.endsWith(".json"));
            for (const file of files) {
              try {
                const data = JSON.parse(fs.readFileSync(file, "utf8"));
                merged.version = data.version || merged.version;
                merged.notes = data.notes || merged.notes;
                merged.pub_date = data.pub_date || merged.pub_date;
                if (data.platforms) {
                  merged.platforms = { ...merged.platforms, ...data.platforms };
                }
              } catch (e) {
                console.error("Error reading file", file, e);
              }
            }
            if (Object.keys(merged.platforms).length > 0) {
              fs.writeFileSync("latest.json", JSON.stringify(merged, null, 2));
              console.log("Merged manifest created:", JSON.stringify(merged, null, 2));
            } else {
              console.log("Platform manifestoları bulunamadı. Birleştirme adımı sessizce atlanıyor (İmzalama anahtarları eksik olabilir).");
              process.exit(0);
            }
          '

      - name: Upload combined latest.json to Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if [ -f latest.json ]; then
            gh release upload "v${{ needs.publish.outputs.app_version }}" latest.json --clobber --repo "${{ github.repository }}"
          else
            echo "latest.json bulunamadı, release yüklemesi atlandı."
          fi
        shell: bash

  # ────────────────────────────────────────────────────
  # 6. Taslak Release'i Canlıya Al (Eşzamanlı Yayınlama)
  #    Tüm platform derlemeleri (Windows & Mac) bittikten sonra çalışır.
  #    Eğer "draft: false" seçildiyse, taslağı tek bir komutla canlıya alır.
  # ────────────────────────────────────────────────────
  publish-release:
    needs: [publish, merge-updater-manifest]
    if: ${{ inputs.draft == 'false' && (success() || always()) }}
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Taslak Release'i Canlıya Çek
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release edit "v${{ needs.publish.outputs.app_version }}" --draft=false --repo "${{ github.repository }}"

  # ────────────────────────────────────────────────────
  # 7. Kanal manifestini güncelle (beta/alpha)
  #    Yayınlanan latest.json'u bu dosyaya kopyalayıp main'e commit'ler.
  #    Sadece draft OLMAYAN beta/alpha yayınlarında çalışır.
  # ────────────────────────────────────────────────────
  update-channel-manifest:
    needs: [publish, merge-updater-manifest, publish-release]
    if: ${{ inputs.draft == 'false' && inputs.build_mode != 'debug-only' }}
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v7
        with:
          ref: main

      - name: Yayınlanan latest.json'u indir
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          mkdir -p updater
          gh release download "v${{ needs.publish.outputs.app_version }}" \
            --repo "${{ github.repository }}" \
            --pattern "latest.json" \
            --output "updater/latest-${{ inputs.channel }}.json" \
            --clobber || echo "latest.json bulunamadı veya indirilemedi, atlanıyor."

      - name: Değişikliği main'e commit'le
        run: |
          if [ -f "updater/latest-${{ inputs.channel }}.json" ]; then
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add "updater/latest-${{ inputs.channel }}.json"
            git commit -m "chore(updater): ${{ inputs.channel }} kanal manifestini v${{ needs.publish.outputs.app_version }} olarak güncelle [skip ci]" || echo "Değişiklik yok, commit edilmedi."
            git push origin main
          else
            echo "Kanal güncelleme dosyası mevcut değil, commit adımı atlandı."
          fi
        shell: bash
