name: '🚀 Publish'

# Tag push edildiğinde otomatik build + yayın.
# Veya GitHub Actions arayüzünden manuel trigger.
# Kanal, tag'in ön-sürüm son ekinden türetilir:
#   v1.0.0          -> stable
#   v1.1.0-beta.1   -> beta
#   v1.2.0-alpha.1  -> alpha
on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      channel:
        description: 'Release channel'
        required: true
        type: choice
        options:
          - stable
          - beta
          - alpha
      version:
        description: 'Version (ör: 1.0.0, 1.1.0)'
        required: true
        type: string

concurrency:
  # Aynı tag için tek yayın; devam eden bir yayını YARIDA KESME (release/tag
  # silme ve manifest commit'i atomik olmayan işlemler).
  group: publish-${{ github.ref_name }}
  cancel-in-progress: false

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always
  SCCACHE_GHA_ENABLED: "true"
  RUSTC_WRAPPER: "sccache"

jobs:
  # ────────────────────────────────────────────────────
  # 1) Tag'den sürüm + kanal türet
  # ────────────────────────────────────────────────────
  prepare:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.meta.outputs.version }}
      tag: ${{ steps.meta.outputs.tag }}
      channel: ${{ steps.meta.outputs.channel }}
      prerelease: ${{ steps.meta.outputs.prerelease }}
    steps:
      - name: Sürüm ve kanalı tag'den hesapla
        id: meta
        shell: bash
        env:
          INPUT_CHANNEL: ${{ inputs.channel }}
          INPUT_VERSION: ${{ inputs.version }}
        run: |
          # workflow_dispatch veya push'dan tag'ı al
          if [ -z "$INPUT_CHANNEL" ]; then
            # push: event'i — GITHUB_REF_NAME'den tag'ı parse et
            TAG="${GITHUB_REF_NAME}"
          else
            # workflow_dispatch — channel + version'dan tag'ı oluştur
            VERSION="$INPUT_VERSION"
            case "$INPUT_CHANNEL" in
              stable) TAG="v${VERSION}" ;;
              beta)   TAG="v${VERSION}-beta.1" ;;
              alpha)  TAG="v${VERSION}-alpha.1" ;;
            esac
          fi
          VERSION="${TAG#v}"            # baştaki 'v' atılır

          # SemVer doğrulama (yalnızca -beta / -alpha ön-sürümlerine izin ver)
          if ! echo "$VERSION" | grep -Eq '^[0-9]+\.[0-9]+\.[0-9]+(-[0-9A-Za-z.]+)?$'; then
            echo "::error::Tag SemVer değil: $TAG (beklenen: v1.2.3 veya v1.2.3-beta.1)"
            exit 1
          fi

          case "$VERSION" in
            *-beta*)  CHANNEL=beta ;;
            *-alpha*) CHANNEL=alpha ;;
            *-*)      echo "::error::Desteklenmeyen ön-sürüm son eki: $VERSION (yalnızca -beta / -alpha)"; exit 1 ;;
            *)        CHANNEL=stable ;;
          esac

          if [ "$CHANNEL" = "stable" ]; then PRE=false; else PRE=true; fi

          echo "tag=$TAG"           >> "$GITHUB_OUTPUT"
          echo "version=$VERSION"   >> "$GITHUB_OUTPUT"
          echo "channel=$CHANNEL"   >> "$GITHUB_OUTPUT"
          echo "prerelease=$PRE"    >> "$GITHUB_OUTPUT"

          {
            echo "### 🚀 Yayın Bilgisi"
            echo "- **Tag:** \`$TAG\`"
            echo "- **Sürüm:** \`$VERSION\`"
            echo "- **Kanal:** \`$CHANNEL\` (prerelease=$PRE)"
          } >> "$GITHUB_STEP_SUMMARY"

  # ────────────────────────────────────────────────────
  # 2) Derle + TASLAK release'e yayınla (Windows + macOS)
  # ────────────────────────────────────────────────────
  build:
    needs: prepare
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            args: ''
            target: aarch64-apple-darwin
            label: macOS-ARM64
          - platform: windows-latest
            args: ''
            target: x86_64-pc-windows-msvc
            label: Windows-x64

    runs-on: ${{ matrix.platform }}

    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0

      # Toolchain + sccache
      - name: Setup sccache
        uses: mozilla-actions/sccache-action@v0.0.7

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: lts/*

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.x

      # Cache
      - name: Cache Tauri bundler (NSIS, Wix etc.)
        if: matrix.platform == 'windows-latest'
        uses: actions/cache@v6
        with:
          path: ~\AppData\Local\tauri
          key: ${{ runner.os }}-tauri-bundler-${{ hashFiles('src-tauri/tauri.conf.json') }}
          restore-keys: |
            ${{ runner.os }}-tauri-bundler-

      - name: Cache Rust dependencies
        uses: actions/cache@v6
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
          key: ${{ matrix.target }}-cargo-${{ hashFiles('src-tauri/Cargo.lock') }}
          restore-keys: |
            ${{ matrix.target }}-cargo-

      - name: Cache Bun
        uses: actions/cache@v6
        with:
          path: ~/.bun
          key: ${{ runner.os }}-bun-${{ hashFiles('bun.lock', 'package.json') }}
          restore-keys: |
            ${{ runner.os }}-bun-

      # Sürüm alanlarını tag ile eşitle (repo değeri ne olursa olsun tag kazanır)
      - name: Sürüm alanlarını tag ile eşitle
        shell: bash
        env:
          APP_VERSION: ${{ needs.prepare.outputs.version }}
        run: |
          node -e '
            const fs = require("fs");
            const v = process.env.APP_VERSION;

            const pkg = JSON.parse(fs.readFileSync("package.json", "utf8"));
            pkg.version = v;
            fs.writeFileSync("package.json", JSON.stringify(pkg, null, 2) + "\n");

            const tauri = JSON.parse(fs.readFileSync("src-tauri/tauri.conf.json", "utf8"));
            tauri.version = v;
            fs.writeFileSync("src-tauri/tauri.conf.json", JSON.stringify(tauri, null, 2) + "\n");

            let cargo = fs.readFileSync("src-tauri/Cargo.toml", "utf8");
            cargo = cargo.replace(/^version = ".*"/m, `version = "${v}"`);
            fs.writeFileSync("src-tauri/Cargo.toml", cargo);

            console.log("Sürüm alanları güncellendi:", v);
          '

      - name: Install frontend dependencies
        run: bun install

      # Stable: İMZALI derleme. tauri-action createUpdaterArtifacts=true olduğu
      # için latest.json + .sig üretir. İmzalama secret'ları ZORUNLU; yoksa
      # updater manifesti üretilmez ve aşağıdaki merge job'ı BİLEREK patlar.
      - name: Build & Publish (Stable, imzalı)
        uses: tauri-apps/tauri-action@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          tagName: ${{ needs.prepare.outputs.tag }}
          releaseName: ${{ needs.prepare.outputs.tag }}
          releaseDraft: true      # Her zaman taslak başla; sonda topluca yayınla
          prerelease: ${{ needs.prepare.outputs.prerelease }}
          args: ${{ matrix.args }} --verbose

      # Debug sürümü: tauri.debug.conf.json ile override.
      #   - createUpdaterArtifacts=false -> imza yok, bu yüzden imza anahtarı VERİLMEZ
      #   - productName="OpenAnime-Debug" -> dosya adı stable'dan farklı olur, üzerine yazmaz
      - name: Build & Publish (Debug)
        uses: tauri-apps/tauri-action@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ needs.prepare.outputs.tag }}
          releaseName: ${{ needs.prepare.outputs.tag }}
          releaseDraft: true
          prerelease: ${{ needs.prepare.outputs.prerelease }}
          args: --debug --config src-tauri/tauri.debug.conf.json ${{ matrix.args }} --verbose

  # ────────────────────────────────────────────────────
  # 3) latest.json'u DOGRULA
  #    tauri-action, createUpdaterArtifacts=true iken latest.json'u KENDISI uretip
  #    (birden fazla platformu birlestirerek) release'e yukler. Bu yuzden ayri bir
  #    "merge" adimina gerek yok; eski Save/merge adimlari tauri v1 disk yolunu
  #    (bundle/updater/latest.json) varsayiyordu ki v2'de o dosya orada olusmaz —
  #    eski release'lerde latest.json olmamasinin gercek sebebi buydu.
  #    Burada yalnizca manifest'in release'de gercekten var oldugunu dogruluyoruz;
  #    yoksa (imza secret'i bozuksa tauri-action zaten patlar) yayini durduruyoruz.
  # ────────────────────────────────────────────────────
  verify-manifest:
    needs: [prepare, build]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: latest.json release'de var mi?
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release download "${{ needs.prepare.outputs.tag }}" \
            --repo "${{ github.repository }}" \
            --pattern "latest.json" \
            --output latest.json \
            --clobber || true
          if [ ! -s latest.json ]; then
            echo "::error::latest.json release'de yok veya bos. tauri-action updater manifestini uretmedi (imza secret degeri eksik/yanlis olabilir). Yayin durduruldu."
            exit 1
          fi
          echo "latest.json bulundu:"
          cat latest.json

  # ────────────────────────────────────────────────────
  # 4) Taslak release'i CANLIYA al
  # ────────────────────────────────────────────────────
  publish-release:
    needs: [prepare, build, verify-manifest]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Taslağı yayınla
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release edit "${{ needs.prepare.outputs.tag }}" \
            --draft=false \
            --repo "${{ github.repository }}"

  # ────────────────────────────────────────────────────
  # 5) Kanal manifestini main'e commit'le (beta/alpha/stable)
  #    updater.rs bu dosyaları okur: updater/latest-<kanal>.json
  # ────────────────────────────────────────────────────
  update-channel-manifest:
    needs: [prepare, verify-manifest, publish-release]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v7
        with:
          ref: main

      - name: Yayınlanan latest.json'u indir
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          mkdir -p updater
          gh release download "${{ needs.prepare.outputs.tag }}" \
            --repo "${{ github.repository }}" \
            --pattern "latest.json" \
            --output "updater/latest-${{ needs.prepare.outputs.channel }}.json" \
            --clobber

      - name: Değişikliği main'e commit'le
        env:
          CHANNEL: ${{ needs.prepare.outputs.channel }}
        run: |
          CHAN="$CHANNEL"
          if [ -f "updater/latest-${CHAN}.json" ]; then
            git config user.name  "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add "updater/latest-${CHAN}.json"
            git commit -m "chore(updater): ${CHAN} kanal manifestini ${{ needs.prepare.outputs.tag }} olarak güncelle [skip ci]" \
              || echo "Değişiklik yok, commit edilmedi."
            git push origin main || { echo "::error::git push başarısız oldu"; exit 1; }
          else
            echo "Kanal manifesti bulunamadı, commit atlandı."
          fi
