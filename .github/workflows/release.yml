name: '🚀 Publish'

# Tag push edildiğinde otomatik build + yayın.
# Kanal, tag'in ön-sürüm son ekinden türetilir:
#   v1.0.0          -> stable
#   v1.1.0-beta.1   -> beta
#   v1.2.0-alpha.1  -> alpha
on:
  push:
    tags:
      - 'v*'

concurrency:
  # Aynı tag için tek yayın; devam eden bir yayını YARIDA KESME (release/tag
  # silme ve manifest commit'i atomik olmayan işlemler).
  group: publish-${{ github.ref_name }}
  cancel-in-progress: false

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always
  SCCACHE_GHA_ENABLED: "true"
  RUSTC_WRAPPER: "sccache"

jobs:
  # ────────────────────────────────────────────────────
  # 1) Tag'den sürüm + kanal türet
  # ────────────────────────────────────────────────────
  prepare:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.meta.outputs.version }}
      tag: ${{ steps.meta.outputs.tag }}
      channel: ${{ steps.meta.outputs.channel }}
      prerelease: ${{ steps.meta.outputs.prerelease }}
    steps:
      - name: Sürüm ve kanalı tag'den hesapla
        id: meta
        shell: bash
        run: |
          TAG="${GITHUB_REF_NAME}"      # örn: v1.0.0 veya v1.1.0-beta.1
          VERSION="${TAG#v}"            # baştaki 'v' atılır

          # SemVer doğrulama (yalnızca -beta / -alpha ön-sürümlerine izin ver)
          if ! echo "$VERSION" | grep -Eq '^[0-9]+\.[0-9]+\.[0-9]+(-[0-9A-Za-z.]+)?$'; then
            echo "::error::Tag SemVer değil: $TAG (beklenen: v1.2.3 veya v1.2.3-beta.1)"
            exit 1
          fi

          case "$VERSION" in
            *-beta*)  CHANNEL=beta ;;
            *-alpha*) CHANNEL=alpha ;;
            *-*)      echo "::error::Desteklenmeyen ön-sürüm son eki: $VERSION (yalnızca -beta / -alpha)"; exit 1 ;;
            *)        CHANNEL=stable ;;
          esac

          if [ "$CHANNEL" = "stable" ]; then PRE=false; else PRE=true; fi

          echo "tag=$TAG"           >> "$GITHUB_OUTPUT"
          echo "version=$VERSION"   >> "$GITHUB_OUTPUT"
          echo "channel=$CHANNEL"   >> "$GITHUB_OUTPUT"
          echo "prerelease=$PRE"    >> "$GITHUB_OUTPUT"

          {
            echo "### 🚀 Yayın Bilgisi"
            echo "- **Tag:** \`$TAG\`"
            echo "- **Sürüm:** \`$VERSION\`"
            echo "- **Kanal:** \`$CHANNEL\` (prerelease=$PRE)"
          } >> "$GITHUB_STEP_SUMMARY"

  # ────────────────────────────────────────────────────
  # 2) Derle + TASLAK release'e yayınla (Windows + macOS)
  # ────────────────────────────────────────────────────
  build:
    needs: prepare
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            args: ''
            target: aarch64-apple-darwin
            label: macOS-ARM64
          - platform: windows-latest
            args: ''
            target: x86_64-pc-windows-msvc
            label: Windows-x64

    runs-on: ${{ matrix.platform }}

    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0

      # Toolchain + sccache
      - name: Setup sccache
        uses: mozilla-actions/sccache-action@v0.0.7

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: lts/*

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      # Cache
      - name: Cache Tauri bundler (NSIS, Wix etc.)
        if: matrix.platform == 'windows-latest'
        uses: actions/cache@v6
        with:
          path: ~\AppData\Local\tauri
          key: ${{ runner.os }}-tauri-bundler-${{ hashFiles('src-tauri/tauri.conf.json') }}
          restore-keys: |
            ${{ runner.os }}-tauri-bundler-

      - name: Cache Rust dependencies
        uses: actions/cache@v6
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
          key: ${{ matrix.target }}-cargo-${{ hashFiles('src-tauri/Cargo.lock') }}
          restore-keys: |
            ${{ matrix.target }}-cargo-

      - name: Cache Bun
        uses: actions/cache@v6
        with:
          path: ~/.bun
          key: ${{ runner.os }}-bun-${{ hashFiles('bun.lock', 'package.json') }}
          restore-keys: |
            ${{ runner.os }}-bun-

      # Sürüm alanlarını tag ile eşitle (repo değeri ne olursa olsun tag kazanır)
      - name: Sürüm alanlarını tag ile eşitle
        shell: bash
        env:
          APP_VERSION: ${{ needs.prepare.outputs.version }}
        run: |
          node -e '
            const fs = require("fs");
            const v = process.env.APP_VERSION;

            const pkg = JSON.parse(fs.readFileSync("package.json", "utf8"));
            pkg.version = v;
            fs.writeFileSync("package.json", JSON.stringify(pkg, null, 2) + "\n");

            const tauri = JSON.parse(fs.readFileSync("src-tauri/tauri.conf.json", "utf8"));
            tauri.version = v;
            fs.writeFileSync("src-tauri/tauri.conf.json", JSON.stringify(tauri, null, 2) + "\n");

            let cargo = fs.readFileSync("src-tauri/Cargo.toml", "utf8");
            cargo = cargo.replace(/^version = ".*"/m, `version = "${v}"`);
            fs.writeFileSync("src-tauri/Cargo.toml", cargo);

            console.log("Sürüm alanları güncellendi:", v);
          '

      - name: Install frontend dependencies
        run: bun install

      # Stable: İMZALI derleme. tauri-action createUpdaterArtifacts=true olduğu
      # için latest.json + .sig üretir. İmzalama secret'ları ZORUNLU; yoksa
      # updater manifesti üretilmez ve aşağıdaki merge job'ı BİLEREK patlar.
      - name: Build & Publish (Stable, imzalı)
        uses: tauri-apps/tauri-action@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          tagName: ${{ needs.prepare.outputs.tag }}
          releaseName: ${{ needs.prepare.outputs.tag }}
          releaseDraft: true      # Her zaman taslak başla; sonda topluca yayınla
          prerelease: ${{ needs.prepare.outputs.prerelease }}
          args: ${{ matrix.args }} --verbose

      # Debug sürümü: tauri.debug.conf.json ile override.
      #   - createUpdaterArtifacts=false -> imza yok, bu yüzden imza anahtarı VERİLMEZ
      #   - productName="OpenAnime-Debug" -> dosya adı stable'dan farklı olur, üzerine yazmaz
      - name: Build & Publish (Debug)
        uses: tauri-apps/tauri-action@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ needs.prepare.outputs.tag }}
          releaseName: ${{ needs.prepare.outputs.tag }}
          releaseDraft: true
          prerelease: ${{ needs.prepare.outputs.prerelease }}
          args: --debug --config src-tauri/tauri.debug.conf.json ${{ matrix.args }} --verbose

      # Bu platformun updater manifestini artifact olarak sakla (merge job birleştirir)
      - name: Save updater manifest artifact
        shell: bash
        run: |
          if [ -f src-tauri/target/release/bundle/updater/latest.json ]; then
            cp src-tauri/target/release/bundle/updater/latest.json "latest-${{ matrix.platform }}.json"
          elif [ -f target/release/bundle/updater/latest.json ]; then
            cp target/release/bundle/updater/latest.json "latest-${{ matrix.platform }}.json"
          else
            echo "::warning::Updater manifesti bulunamadı (imzalama anahtarı eksik olabilir)."
          fi

      - name: Upload updater manifest artifact
        uses: actions/upload-artifact@v4
        with:
          name: latest-${{ matrix.platform }}
          path: latest-${{ matrix.platform }}.json
          if-no-files-found: ignore

  # ────────────────────────────────────────────────────
  # 3) Platform latest.json'larını birleştir + release'e yükle
  # ────────────────────────────────────────────────────
  merge-updater-manifest:
    needs: [prepare, build]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download all manifest artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: latest-*
          merge-multiple: true

      - name: Merge updater manifests
        run: |
          node -e '
            const fs = require("fs");
            let merged = { version: "", notes: "", pub_date: "", platforms: {} };
            const files = fs.readdirSync(".").filter(f => f.startsWith("latest-") && f.endsWith(".json"));
            for (const file of files) {
              try {
                const d = JSON.parse(fs.readFileSync(file, "utf8"));
                merged.version  = d.version  || merged.version;
                merged.notes    = d.notes    || merged.notes;
                merged.pub_date = d.pub_date || merged.pub_date;
                if (d.platforms) merged.platforms = { ...merged.platforms, ...d.platforms };
              } catch (e) { console.error("Okuma hatası", file, e); }
            }
            if (Object.keys(merged.platforms).length === 0) {
              console.error("HATA: Hicbir platform manifesti yok. Imzalama secret degerleri (TAURI_SIGNING_PRIVATE_KEY / _PASSWORD) eksik veya yanlis olabilir; updater latest.json URETILEMEDI. Yayin durduruldu.");
              process.exit(1);
            }
            fs.writeFileSync("latest.json", JSON.stringify(merged, null, 2));
            console.log("Birleştirilmiş manifest:\n" + JSON.stringify(merged, null, 2));
          '

      - name: Upload combined latest.json to Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release upload "${{ needs.prepare.outputs.tag }}" latest.json --clobber --repo "${{ github.repository }}"

  # ────────────────────────────────────────────────────
  # 4) Aynı kanaldaki ESKİ release + tag'leri sil
  #    (yeni release henüz TASLAK; canlıya alınmadan önce eskiler temizlenir)
  #    Yalnızca yayınlanan kanalla sınırlı: stable yayını beta/alpha'ya dokunmaz.
  # ────────────────────────────────────────────────────
  cleanup-old-releases:
    needs: [prepare, build, merge-updater-manifest]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Aynı kanaldaki eski release ve tag'leri sil
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CUR_TAG: ${{ needs.prepare.outputs.tag }}
          CUR_CHAN: ${{ needs.prepare.outputs.channel }}
        run: |
          set -euo pipefail
          chan_of() {
            case "$1" in
              *-beta*)  echo beta ;;
              *-alpha*) echo alpha ;;
              *)        echo stable ;;
            esac
          }
          echo "Mevcut: $CUR_TAG (kanal=$CUR_CHAN). Aynı kanaldaki eskiler siliniyor..."

          # 4a) Release'ler (tag'iyle birlikte --cleanup-tag)
          for t in $(gh release list --limit 200 --repo "${{ github.repository }}" --json tagName --jq '.[].tagName'); do
            [ "$t" = "$CUR_TAG" ] && continue
            [ "$(chan_of "$t")" = "$CUR_CHAN" ] || continue
            echo "  - Release siliniyor: $t"
            gh release delete "$t" --yes --cleanup-tag --repo "${{ github.repository }}" || echo "    (silinemedi, atlandı)"
          done

          # 4b) Release'i olmayan başıboş tag'ler
          git fetch --tags --force
          for t in $(git tag -l); do
            [ "$t" = "$CUR_TAG" ] && continue
            [ "$(chan_of "$t")" = "$CUR_CHAN" ] || continue
            echo "  - Başıboş tag siliniyor: $t"
            git push origin ":refs/tags/$t" || echo "    (silinemedi, atlandı)"
          done

  # ────────────────────────────────────────────────────
  # 5) Taslak release'i CANLIYA al
  # ────────────────────────────────────────────────────
  publish-release:
    needs: [prepare, build, merge-updater-manifest, cleanup-old-releases]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Taslağı yayınla
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release edit "${{ needs.prepare.outputs.tag }}" \
            --draft=false \
            --repo "${{ github.repository }}"

  # ────────────────────────────────────────────────────
  # 6) Kanal manifestini main'e commit'le (beta/alpha/stable)
  #    updater.rs bu dosyaları okur: updater/latest-<kanal>.json
  # ────────────────────────────────────────────────────
  update-channel-manifest:
    needs: [prepare, merge-updater-manifest, publish-release]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v7
        with:
          ref: main

      - name: Yayınlanan latest.json'u indir
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          mkdir -p updater
          gh release download "${{ needs.prepare.outputs.tag }}" \
            --repo "${{ github.repository }}" \
            --pattern "latest.json" \
            --output "updater/latest-${{ needs.prepare.outputs.channel }}.json" \
            --clobber

      - name: Değişikliği main'e commit'le
        run: |
          CHAN="${{ needs.prepare.outputs.channel }}"
          if [ -f "updater/latest-${CHAN}.json" ]; then
            git config user.name  "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add "updater/latest-${CHAN}.json"
            git commit -m "chore(updater): ${CHAN} kanal manifestini ${{ needs.prepare.outputs.tag }} olarak güncelle [skip ci]" \
              || echo "Değişiklik yok, commit edilmedi."
            git push origin main
          else
            echo "Kanal manifesti bulunamadı, commit atlandı."
          fi
