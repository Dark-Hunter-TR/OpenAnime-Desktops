name: '🚀 Publish'

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Sürüm numarası (Boş bırakılırsa en son etiket/tag baz alınarak otomatik hesaplanır)'
        required: false
        type: string
      channel:
        description: 'Release kanalı (prerelease durumunu belirler)'
        required: true
        default: 'beta'
        type: choice
        options:
          - stable
          - beta
          - alpha
      draft:
        description: 'Draft olarak oluştur (açıklamayı sonra sen yazarsın)'
        required: true
        default: true
        type: boolean
      build_mode:
        description: 'Derleme Tipi (Kullanıcılar için hata ayıklama / debug sürümü dahil etme)'
        required: true
        default: 'both'
        type: choice
        options:
          - stable-only
          - debug-only
          - both

concurrency:
  group: publish-${{ github.ref }}-${{ inputs.channel }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  SCCACHE_GHA_ENABLED: "true"
  RUSTC_WRAPPER: "sccache"

jobs:
  publish:
    permissions:
      contents: write
    outputs:
      app_version: ${{ steps.versioning.outputs.version }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            args: ''
            target: aarch64-apple-darwin
            label: macOS-ARM64
          - platform: windows-latest
            args: ''
            target: x86_64-pc-windows-msvc
            label: Windows-x64

    runs-on: ${{ matrix.platform }}

    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0 # Tüm geçmişi ve tag'leri çekmek için

      # ────────────────────────────────────────────────────
      # Toolchain + sccache
      # ────────────────────────────────────────────────────
      - name: Setup sccache
        uses: mozilla-actions/sccache-action@v0.0.7

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: lts/*

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      # ────────────────────────────────────────────────────
      # 3. Cache
      # ────────────────────────────────────────────────────
      - name: Cache Tauri bundler (NSIS, Wix etc.)
        if: matrix.platform == 'windows-latest'
        uses: actions/cache@v6
        with:
          path: ~\AppData\Local\tauri
          key: ${{ runner.os }}-tauri-bundler-${{ hashFiles('src-tauri/tauri.conf.json') }}
          restore-keys: |
            ${{ runner.os }}-tauri-bundler-

      - name: Cache Rust dependencies
        uses: actions/cache@v6
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
          key: ${{ matrix.target }}-cargo-${{ hashFiles('src-tauri/Cargo.lock') }}
          restore-keys: |
            ${{ matrix.target }}-cargo-

      - name: Cache Bun
        uses: actions/cache@v6
        with:
          path: ~/.bun
          key: ${{ runner.os }}-bun-${{ hashFiles('bun.lock', 'package.json') }}
          restore-keys: |
            ${{ runner.os }}-bun-

      # ────────────────────────────────────────────────────
      # 4. Build & Release
      # ────────────────────────────────────────────────────
      - name: Calculate & Update Version
        id: versioning
        shell: bash
        run: |
          node -e '
            const fs = require("fs");
            const { execSync } = require("child_process");
            
            let finalVersion = "${{ inputs.version }}".trim();
            const channel = "${{ inputs.channel }}";
            
            if (!finalVersion) {
              console.log("Sürüm girilmedi, yerel git tag geçmişi taranıyor...");
              let latestTag = "v0.0.0";
              try {
                // En son tagleri tarihe göre sirala ve en sonuncusunu al
                latestTag = execSync("git describe --tags --abbrev=0").toString().trim();
                console.log("Bulunan en son Git etiketi:", latestTag);
              } catch (e) {
                console.log("Hiç etiket bulunamadı, v0.0.0 baz alınıyor.");
              }
              
              // "v1.2.3-beta.1" -> "1.2.3-beta.1"
              let cleanTag = latestTag.startsWith("v") ? latestTag.slice(1) : latestTag;
              
              // SemVer parcalama
              // Regex: MAJOR.MINOR.PATCH[-PRERELEASE]
              const match = cleanTag.match(/^(\d+)\.(\d+)\.(\d+)(?:-([a-zA-Z0-9.]+))?$/);
              if (!match) {
                console.error("HATA: En son etiket SemVer ile uyumlu değil:", cleanTag);
                process.exit(1);
              }
              
              let major = parseInt(match[1]);
              let minor = parseInt(match[2]);
              let patch = parseInt(match[3]);
              let prerelease = match[4] || ""; // "beta.1", "alpha.4" vb.
              
              if (channel === "stable") {
                // Stable kanalinda her zaman PATCH sürümünü artir ve prerelease etiketini kaldir
                finalVersion = `${major}.${minor}.${patch + 1}`;
              } else {
                // beta veya alpha kanali
                if (prerelease && prerelease.startsWith(channel)) {
                  // Mevcut etiket zaten bu kanalda (örn: beta.1) -> indeksi artir
                  const parts = prerelease.split(".");
                  const index = parts.length > 1 ? parseInt(parts[1]) : 0;
                  finalVersion = `${major}.${minor}.${patch}-${channel}.${index + 1}`;
                } else {
                  // Yeni bir pre-release serisi baslat (PATCH artar ve kanal.1 olur)
                  finalVersion = `${major}.${minor}.${patch + 1}-${channel}.1`;
                }
              }
            }
            
            // SemVer Doğrulama
            const semverRegex = /^\d+\.\d+\.\d+(-[a-zA-Z0-9.]+)?$/;
            if (!semverRegex.test(finalVersion)) {
              console.error("HATA: Hesaplanan sürüm numarası SemVer standartlarına uymuyor:", finalVersion);
              process.exit(1);
            }
            
            console.log("UYGULANACAK SÜRÜM:", finalVersion);
            
            // Sonraki adımlar için hem GITHUB_ENV hem de GITHUB_OUTPUT'a kaydet
            fs.appendFileSync(process.env.GITHUB_ENV, `APP_VERSION=${finalVersion}\n`);
            fs.appendFileSync(process.env.GITHUB_OUTPUT, `version=${finalVersion}\n`);
            
            // 1. package.json geçici güncelle
            const pkg = JSON.parse(fs.readFileSync("package.json", "utf8"));
            pkg.version = finalVersion;
            fs.writeFileSync("package.json", JSON.stringify(pkg, null, 2));
            console.log("package.json geçici olarak güncellendi.");
            
            // 2. tauri.conf.json geçici güncelle
            const tauri = JSON.parse(fs.readFileSync("src-tauri/tauri.conf.json", "utf8"));
            tauri.version = finalVersion;
            fs.writeFileSync("src-tauri/tauri.conf.json", JSON.stringify(tauri, null, 2));
            console.log("tauri.conf.json geçici olarak güncellendi.");
            
            // 3. Cargo.toml geçici güncelle
            let cargo = fs.readFileSync("src-tauri/Cargo.toml", "utf8");
            cargo = cargo.replace(/^version = ".*"/m, `version = "${finalVersion}"`);
            fs.writeFileSync("src-tauri/Cargo.toml", cargo);
            console.log("Cargo.toml geçici olarak güncellendi.");
          '

      - name: Install frontend dependencies
        run: bun install

      - name: Build & Publish Stable Version
        if: ${{ inputs.build_mode == 'stable-only' || inputs.build_mode == 'both' }}
        uses: tauri-apps/tauri-action@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          tagName: v${{ env.APP_VERSION }}
          releaseName: 'OpenAnime Desktop v${{ env.APP_VERSION }} (${{ inputs.channel }})'
          releaseDraft: ${{ inputs.draft == 'true' }}
          prerelease: ${{ inputs.channel != 'stable' }}
          args: ${{ matrix.args }} --verbose

      - name: Build & Publish Debug Version
        if: ${{ inputs.build_mode == 'debug-only' || inputs.build_mode == 'both' }}
        uses: tauri-apps/tauri-action@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: v${{ env.APP_VERSION }}
          releaseName: 'OpenAnime Desktop v${{ env.APP_VERSION }} (${{ inputs.channel }})'
          releaseDraft: ${{ inputs.draft == 'true' }}
          prerelease: ${{ inputs.channel != 'stable' }}
          args: --debug ${{ matrix.args }} --verbose

      - name: Save updater manifest artifact
        if: ${{ inputs.build_mode == 'stable-only' || inputs.build_mode == 'both' }}
        run: |
          if [ -f src-tauri/target/release/bundle/updater/latest.json ]; then
            cp src-tauri/target/release/bundle/updater/latest.json latest-${{ matrix.platform }}.json
          elif [ -f target/release/bundle/updater/latest.json ]; then
            cp target/release/bundle/updater/latest.json latest-${{ matrix.platform }}.json
          else
            echo "Updater manifest not found (signing key might be missing)."
          fi
        shell: bash

      - name: Upload updater manifest artifact
        if: ${{ inputs.build_mode == 'stable-only' || inputs.build_mode == 'both' }}
        uses: actions/upload-artifact@v4
        with:
          name: latest-${{ matrix.platform }}
          path: latest-${{ matrix.platform }}.json
          if-no-files-found: ignore

  # ────────────────────────────────────────────────────
  # 5. Farklı platformların latest.json dosyalarını birleştir
  # ────────────────────────────────────────────────────
  merge-updater-manifest:
    needs: publish
    if: ${{ inputs.build_mode != 'debug-only' }}
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: latest-*
          merge-multiple: true

      - name: Merge updater manifests
        run: |
          node -e '
            const fs = require("fs");
            let merged = {
              version: "",
              notes: "",
              pub_date: "",
              platforms: {}
            };
            const files = fs.readdirSync(".").filter(f => f.startsWith("latest-") && f.endsWith(".json"));
            for (const file of files) {
              try {
                const data = JSON.parse(fs.readFileSync(file, "utf8"));
                merged.version = data.version || merged.version;
                merged.notes = data.notes || merged.notes;
                merged.pub_date = data.pub_date || merged.pub_date;
                if (data.platforms) {
                  merged.platforms = { ...merged.platforms, ...data.platforms };
                }
              } catch (e) {
                console.error("Error reading file", file, e);
              }
            }
            if (Object.keys(merged.platforms).length > 0) {
              fs.writeFileSync("latest.json", JSON.stringify(merged, null, 2));
              console.log("Merged manifest created:", JSON.stringify(merged, null, 2));
            } else {
              console.log("No platform manifests found to merge.");
              process.exit(1);
            }
          '

      - name: Upload combined latest.json to Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release upload "v${{ needs.publish.outputs.app_version }}" latest.json --clobber --repo "${{ github.repository }}"

  # ────────────────────────────────────────────────────
  # 6. Kanal manifestini güncelle (beta/alpha)
  #    Yayınlanan latest.json'u bu dosyaya kopyalayıp main'e commit'ler.
  #    Sadece draft OLMAYAN beta/alpha yayınlarında çalışır.
  # ────────────────────────────────────────────────────
  update-channel-manifest:
    needs: [publish, merge-updater-manifest]
    if: ${{ inputs.draft == 'false' && inputs.build_mode != 'debug-only' }}
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v7
        with:
          ref: main

      - name: Yayınlanan latest.json'u indir
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          mkdir -p updater
          gh release download "v${{ needs.publish.outputs.app_version }}" \
            --repo "${{ github.repository }}" \
            --pattern "latest.json" \
            --output "updater/latest-${{ inputs.channel }}.json" \
            --clobber

      - name: Değişikliği main'e commit'le
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add "updater/latest-${{ inputs.channel }}.json"
          git commit -m "chore(updater): ${{ inputs.channel }} kanal manifestini v${{ needs.publish.outputs.app_version }} olarak güncelle [skip ci]" || echo "Değişiklik yok, commit edilmedi."
          git push origin main
