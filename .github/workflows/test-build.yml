name: '🧪 Test Build'

on:
  workflow_dispatch:
    inputs:
      platform:
        description: 'Build alınacak platform'
        required: true
        default: 'all'
        type: choice
        options:
          - all
          - windows-latest
          - ubuntu-22.04
          - macos-latest
      build_mode:
        description: 'Build modu'
        required: true
        default: 'release'
        type: choice
        options:
          - release
          - debug
      upload_artifacts:
        description: 'Artifact olarak yükle'
        required: true
        default: true
        type: boolean

jobs:
  test-build:
    permissions:
      contents: read
      actions: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: windows-latest
            args: ''
            target: x86_64-pc-windows-msvc
            label: Windows-x64
          - platform: ubuntu-22.04
            args: ''
            target: x86_64-unknown-linux-gnu
            label: Linux-x64
          - platform: ubuntu-22.04
            args: '--target aarch64-unknown-linux-gnu'
            target: aarch64-unknown-linux-gnu
            label: Linux-ARM64
          - platform: macos-latest
            args: ''
            target: aarch64-apple-darwin
            label: macOS-ARM64

    runs-on: ${{ matrix.platform }}

    if: |
      github.event.inputs.platform == 'all' ||
      matrix.platform == github.event.inputs.platform

    steps:
      - uses: actions/checkout@v4

      # ────────────────────────────────────────────────────
      # Linux bağımlılıkları
      # ────────────────────────────────────────────────────
      - name: Install Linux dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get remove -y 'libunwind-1[0-9]-dev' || true
          sudo apt-get install -y libunwind-dev
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            build-essential \
            curl \
            wget \
            file \
            libxdo-dev \
            libssl-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            libgstreamer1.0-dev \
            libgstreamer-plugins-base1.0-dev \
            gstreamer1.0-plugins-good \
            gstreamer1.0-plugins-bad \
            gstreamer1.0-plugins-ugly \
            gstreamer1.0-libav

      - name: Install ARM64 cross-compilation deps
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        run: |
          sudo apt-get install -y \
            gcc-aarch64-linux-gnu \
            g++-aarch64-linux-gnu \
            libwebkit2gtk-4.1-dev:arm64 \
            libgtk-3-dev:arm64 \
            libayatana-appindicator3-dev:arm64 \
            librsvg2-dev:arm64 || true
          rustup target add aarch64-unknown-linux-gnu
          echo "CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER=aarch64-linux-gnu-gcc" >> $GITHUB_ENV

      # ────────────────────────────────────────────────────
      # Toolchain
      # ────────────────────────────────────────────────────
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: lts/*

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      # ────────────────────────────────────────────────────
      # Cache
      # ────────────────────────────────────────────────────
      - name: Cache Rust
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            src-tauri/target
          key: ${{ matrix.target }}-cargo-${{ hashFiles('src-tauri/Cargo.lock') }}
          restore-keys: |
            ${{ matrix.target }}-cargo-

      - name: Cache Bun
        uses: actions/cache@v4
        with:
          path: ~/.bun
          key: ${{ runner.os }}-bun-${{ hashFiles('bun.lock', 'package.json') }}
          restore-keys: |
            ${{ runner.os }}-bun-

      # ────────────────────────────────────────────────────
      # Build
      # ────────────────────────────────────────────────────
      - name: Install frontend dependencies
        run: bun install

      - name: Build the app
        uses: tauri-apps/tauri-action@v4
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          releaseDraft: false
          prerelease: false
          args: ${{ matrix.args }}
          # NOT: includeDebug parametresi tauri-action@v4'te yok.
          # Debug build için Tauri'nin kendi debug profili kullanılır.
          # Debug build'de bundle oluşmaz, sadece binary build edilir.

      # ────────────────────────────────────────────────────
      # Artifact Upload
      # ────────────────────────────────────────────────────
      - name: Set artifact path
        id: artifact_path
        shell: bash
        run: |
          if [ "${{ github.event.inputs.build_mode }}" == "debug" ]; then
            echo "path=src-tauri/target/debug" >> $GITHUB_OUTPUT
          else
            echo "path=src-tauri/target/release/bundle" >> $GITHUB_OUTPUT
          fi

      - name: Upload build artifacts
        if: github.event.inputs.upload_artifacts == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: OpenAnime-${{ matrix.label }}-${{ github.event.inputs.build_mode }}-${{ github.sha }}
          path: |
            ${{ steps.artifact_path.outputs.path }}/**/*
          if-no-files-found: warn
          retention-days: 7
