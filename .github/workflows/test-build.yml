name: '🧪 Test Build'

on:
  workflow_dispatch:
    inputs:
      platform:
        description: 'Build alınacak platform'
        required: true
        default: 'all'
        type: choice
        options:
          - all
          - windows-latest
          - macos-latest
      build_mode:
        description: 'Build modu (test-release = hızlı, release = full opt)'
        required: true
        default: 'test-release'
        type: choice
        options:
          - test-release
          - release
          - debug
      upload_artifacts:
        description: 'Artifact olarak yükle'
        required: true
        default: true
        type: boolean

env:
  CARGO_TERM_COLOR: always
  SCCACHE_GHA_ENABLED: "true"
  RUSTC_WRAPPER: "sccache"

jobs:
  windows:
    if: github.event.inputs.platform == 'all' || github.event.inputs.platform == 'windows-latest'
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v7

      - name: Setup sccache
        uses: mozilla-actions/sccache-action@v0.0.7

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: lts/*

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Cache Rust dependencies
        uses: actions/cache@v6
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
          key: windows-cargo-${{ hashFiles('src-tauri/Cargo.lock') }}
          restore-keys: |
            windows-cargo-

      - name: Cache Tauri bundler (NSIS, Wix etc.)
        uses: actions/cache@v6
        with:
          path: ~\AppData\Local\tauri
          key: windows-tauri-bundler
          restore-keys: |
            windows-tauri-bundler-

      - name: Cache Bun
        uses: actions/cache@v6
        with:
          path: ~/.bun
          key: windows-bun-${{ hashFiles('bun.lock', 'package.json') }}
          restore-keys: |
            windows-bun-

      - name: Install frontend dependencies
        run: bun install

      - name: Build
        uses: tauri-apps/tauri-action@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          releaseDraft: false
          prerelease: false
          args: ${{ github.event.inputs.build_mode == 'debug' && '--debug' || github.event.inputs.build_mode == 'test-release' && '-- --profile test-release' || '' }} --verbose

      - name: Upload artifacts
        if: github.event.inputs.upload_artifacts == 'true'
        uses: actions/upload-artifact@v7
        with:
          name: Windows-x64-${{ github.event.inputs.build_mode }}
          path: src-tauri/target/${{ github.event.inputs.build_mode }}/bundle
          if-no-files-found: warn
          retention-days: 7

  macos:
    if: github.event.inputs.platform == 'all' || github.event.inputs.platform == 'macos-latest'
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v7

      - name: Setup sccache
        uses: mozilla-actions/sccache-action@v0.0.7

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: lts/*

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Cache Rust dependencies
        uses: actions/cache@v6
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
          key: macos-cargo-${{ hashFiles('src-tauri/Cargo.lock') }}
          restore-keys: |
            macos-cargo-

      - name: Cache Bun
        uses: actions/cache@v6
        with:
          path: ~/.bun
          key: macos-bun-${{ hashFiles('bun.lock', 'package.json') }}
          restore-keys: |
            macos-bun-

      - name: Install frontend dependencies
        run: bun install

      - name: Build
        uses: tauri-apps/tauri-action@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          releaseDraft: false
          prerelease: false
          args: ${{ github.event.inputs.build_mode == 'debug' && '--debug' || github.event.inputs.build_mode == 'test-release' && '-- --profile test-release' || '' }} --verbose

      - name: Upload artifacts
        if: github.event.inputs.upload_artifacts == 'true'
        uses: actions/upload-artifact@v7
        with:
          name: macOS-ARM64-${{ github.event.inputs.build_mode }}
          path: src-tauri/target/${{ github.event.inputs.build_mode }}/bundle
          if-no-files-found: warn
          retention-days: 7

